version: '3.8'
name: astrik-ai-platform
networks:
  astrik-net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.20.0.0/16
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  nats_data:
    driver: local
  llamacpp_models:
    driver: local
services:
  postgres:
    image: postgres:16-alpine
    container_name: astrik-postgres
    ports:
    - ${POSTGRES_PORT:-5432}:5432
    env_file:
    - .env
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-astrik}
      interval: 10s
      retries: 5
    networks:
    - astrik-net
  redis:
    image: redis:7-alpine
    container_name: astrik-redis
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      retries: 5
    networks:
    - astrik-net
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: astrik-qdrant
    ports:
    - 6333:6333
    - 6334:6334
    volumes:
    - qdrant_data:/qdrant/storage
    healthcheck:
      test:
      - CMD-SHELL
      - 'bash -lc "exec 3<>/dev/tcp/127.0.0.1/6333; printf ''GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n'' >&3; grep -q ''200 OK'' <&3"'
      interval: 15s
      retries: 5
    networks:
    - astrik-net
  nats:
    image: nats:2.10-alpine
    container_name: astrik-nats
    ports:
    - 4222:4222
    - 8222:8222
    volumes:
    - nats_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:8222/healthz || exit 1
      interval: 15s
      retries: 5
    networks:
    - astrik-net
  llamacpp:
    profiles:
    - ai
    build:
      context: ..
      dockerfile: runtimes/llamacpp/Dockerfile
    container_name: astrik-llamacpp
    ports:
    - ${LLAMA_PORT:-8081}:8080
    environment:
      LLAMA_MODEL: ${LLAMA_MODEL:-hermes3}
      LLAMA_N_GPU_LAYERS: ${LLAMA_N_GPU_LAYERS:-35}
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-8192}
    volumes:
    - llamacpp_models:/models
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8080/health || exit 1
      interval: 30s
      retries: 3
    networks:
    - astrik-net
